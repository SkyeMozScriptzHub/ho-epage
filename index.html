<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f14, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTAINER */
.container {
  text-align: center;
  animation: fadeUp 1s ease;
}

/* TITLE */
h1 {
  font-size: 42px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* SEARCH BOX */
.search-box {
  position: relative;
}

input {
  padding: 16px 50px 16px 20px;
  width: 350px;
  border-radius: 40px;
  border: none;
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}

input:focus {
  transform: scale(1.05);
}

/* BUTTON */
button {
  position: absolute;
  right: 5px;
  top: 5px;
  height: 40px;
  width: 40px;
  border-radius: 50%;
  border: none;
  background: #6c4cff;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.1) rotate(10deg);
}

/* SUGGESTIONS */
.suggestions {
  position: absolute;
  width: 100%;
  background: rgba(30,30,50,0.95);
  border-radius: 12px;
  margin-top: 8px;
  backdrop-filter: blur(10px);
  display: none;
  overflow: hidden;
}

.suggestions div {
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.suggestions div:hover {
  background: #333;
}

/* LOADING */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f0f14;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>🔎 Search Anything</h1>

  <div class="search-box">
    <input id="search" placeholder="Type something...">
    <button onclick="searchNow()">→</button>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>

<div class="loading" id="loading">Loading...</div>

<script>
const input = document.getElementById("search");
const suggestionsBox = document.getElementById("suggestions");

input.addEventListener("input", async () => {
  let query = input.value;
  if (!query) {
    suggestionsBox.style.display = "none";
    return;
  }

  try {
    // Using DuckDuckGo instant suggestions (no API key needed)
    let res = await fetch("https://duckduckgo.com/ac/?q=" + query);
    let data = await res.json();

    suggestionsBox.innerHTML = "";

    data.slice(0,5).forEach(item => {
      let div = document.createElement("div");
      div.textContent = item.phrase;
      div.onclick = () => goSearch(item.phrase);
      suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display = "block";
  } catch {
    suggestionsBox.style.display = "none";
  }
});

/* ENTER KEY */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    searchNow();
  }
});

function searchNow() {
  let query = input.value.trim();
  if (!query) return;
  goSearch(query);
}

function goSearch(query) {
  document.getElementById("loading").style.display = "flex";

  setTimeout(() => {
    window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
  }, 700);
}
</script>

</body>
</html>
