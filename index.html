<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyeMoz Test</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f14, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* MAIN */
.container {
  text-align: center;
  animation: fadeUp 1s ease;
}

/* TITLE */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* SEARCH */
.search-box {
  position: relative;
}

input {
  padding: 15px;
  width: 300px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* SUGGESTIONS */
.suggestions {
  position: absolute;
  width: 100%;
  background: #1f1f2e;
  border-radius: 10px;
  margin-top: 5px;
  display: none;
  text-align: left;
}

.suggestions div {
  padding: 10px;
  cursor: pointer;
}
.suggestions div:hover {
  background: #333;
}

/* TOGGLE */
.toggle {
  margin-top: 15px;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
}

/* LOADING */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 24px;
}

/* ANIM */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 SkyeMoz Test Mode</h1>

  <div class="search-box">
    <input id="search" placeholder="Search anything...">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="toggle" onclick="toggleMode()">
    Mode: <span id="mode">New Tab</span>
  </div>
</div>

<div class="loading" id="loading">Loading...</div>

<script>
const data = [
  {name: "YouTube", url: "https://youtube.com"},
  {name: "Discord", url: "https://discord.com"},
  {name: "Google", url: "https://google.com"},
  {name: "SkyeMoz", url: "https://your-site.vercel.app"}
];

let newTab = true;

const search = document.getElementById("search");
const suggestions = document.getElementById("suggestions");

search.addEventListener("input", () => {
  let value = search.value.toLowerCase();
  suggestions.innerHTML = "";

  if (!value) {
    suggestions.style.display = "none";
    return;
  }

  let filtered = data.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  filtered.forEach(item => {
    let div = document.createElement("div");
    div.textContent = item.name;
    div.onclick = () => go(item.url);
    suggestions.appendChild(div);
  });

  suggestions.style.display = "block";
});

search.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    let match = data.find(item =>
      item.name.toLowerCase().includes(search.value.toLowerCase())
    );
    if (match) go(match.url);
  }
});

function go(url) {
  document.getElementById("loading").style.display = "flex";

  setTimeout(() => {
    if (newTab) {
      window.open(url, "_blank");
    } else {
      window.location.href = url;
    }
  }, 800);
}

function toggleMode() {
  newTab = !newTab;
  document.getElementById("mode").textContent = newTab ? "New Tab" : "Direct";
}
</script>

</body>
</html>
